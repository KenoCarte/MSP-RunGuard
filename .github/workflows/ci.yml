name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax check core scripts
        run: |
          python -m py_compile analysis/risk_scoring.py
          python -m py_compile analysis/run_temporal_analysis.py
          python -m py_compile infer/infer_once.py

  qt-client-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt/CMake toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev qt6-base-dev-tools

      - name: Configure
        working-directory: qt_client
        run: cmake -S . -B build

      - name: Build
        working-directory: qt_client
        run: cmake --build build --config Release -j
